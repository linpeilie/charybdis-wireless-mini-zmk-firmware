# --- 基础日志 ---
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=4    # 0=none, 1=err, 2=warn, 3=info, 4=debug

# --- USB CDC ACM 后端 ---
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="ZMK Keyboard Debug"
CONFIG_LOG_BACKEND_USBACM=y
CONFIG_LOG_BACKEND_USBACM_INITIALIZED=y

# --- ZMK 模块日志级别 ---
CONFIG_ZMK_LOG_LEVEL_DBG=y
